seed: 42

data:
  grid: 0.5
  max_seq_len: 128
  train_ratio: 0.70
  val_ratio: 0.15
  test_ratio: 0.15
  max_chorales: null
  fallback_chorales: 96
  synthetic_only: false
  transpose_shifts: [-5, -3, -2, 0, 2, 3, 5]

vocab:
  min_pitch: 21
  max_pitch: 108
  special_tokens:
    - PAD
    - REST
    - HOLD
    - START
    - END

training:
  batch_size: 16
  epochs: 8
  learning_rate: 0.001
  weight_decay: 0.00001
  grad_clip: 1.0
  device: cpu

unconditioned_model:
  embedding_dim: 64
  hidden_dim: 128
  num_layers: 2
  dropout: 0.2
  temperature: 0.7
  top_k: 5
  sample_length: 96
  rerank_candidates: 30

conditioned_model:
  embedding_dim: 64
  hidden_dim: 128
  num_layers: 2
  dropout: 0.2
  bidirectional: true
  temperature: 0.9
  sample_length: 96
  use_custom_demo_melody: true
  beam_size: 8
  top_k_per_voice: 5
  rule_weight: 1.0

paths:
  processed_data: outputs/processed/bach_chorales.pkl
  figures_dir: outputs/figures
  tables_dir: outputs/tables
  midi_dir: outputs/midi
  checkpoints_dir: outputs/checkpoints
  logs_dir: outputs/logs
